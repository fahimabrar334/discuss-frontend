<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Group Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
background:#eef2ff;
}

/* LOGIN */

#home{
height:100%;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:40px;
width:350px;
border-radius:20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

h1{
margin-bottom:20px;
}

.quote{
color:#555;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:10px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
cursor:pointer;
}

/* CHAT */

#chat{
display:none;
height:100%;
}

.header{
background:#4f46e5;
color:white;
padding:20px;
}

.messages{
height:75vh;
overflow:auto;
padding:20px;
}

.msg{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.send{
display:flex;
padding:10px;
gap:10px;
background:white;
}

.send input{
margin:0;
}

</style>

</head>

<body>

<div id="home">

<div class="card">

<!-- ONLY CHANGE: ADDED IMAGE HERE -->
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png"
style="width:80px;height:80px;margin-bottom:15px;">

<h1>True success is the quiet satisfaction of knowing you did your best.</h1>

<div class="quote">
Failure is the pillar of success
</div>

<input id="username" placeholder="Enter your name">

<button onclick="enterChat()">
Go to Group Chat
</button>

</div>

</div>

<div id="chat">

<div class="header">
Please discuss only essential matters<span id="showName"></span>
</div>

<div class="messages" id="messages">
</div>

<div class="send">

<input id="message" placeholder="Write message">

<button onclick="send()">
Send
</button>

</div>

</div>

<script>

let user="";

function enterChat(){

user = document.getElementById("username").value.trim();

if(user===""){
alert("Enter name");
return;
}

document.getElementById("home").style.display="none";
document.getElementById("chat").style.display="block";

document.getElementById("showName").innerText = user;

}

function send(){

let text = document.getElementById("message").value;

if(text==="")
return;

document.getElementById("messages").innerHTML +=
`
<div class="msg">
<b>${user}</b><br>
${text}
</div>
`;

document.getElementById("message").value="";

}

</script>

</body>
</html>
