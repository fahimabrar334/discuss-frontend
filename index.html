<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
<style>
  :root{
    --ink:#101a27;
    --surface:#16243a;
    --surface-soft:#1c2e48;
    --card:#f6f4ee;
    --text:#1b2430;
    --muted:#5d6b7c;
    --line:#dcd7c9;
    --accent:#c19a55;
    --accent-deep:#8f7036;
    --teal:#3f7e78;
    --sky-dusk-top:#0a1320;
    --sky-dusk-bottom:#16243a;
    --sky-dawn-top:#2d4a6b;
    --sky-dawn-mid:#7a93a8;
    --sky-dawn-bottom:#e8c98a;
    --radius:14px;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
    background:var(--ink);
    font-family:'Inter', sans-serif;
    color:var(--text);
    overflow:hidden;
  }

  .app{
    position:relative;
    width:100%;
    height:100vh;
  }

  /* ---------- HOME ---------- */
  #home{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(ellipse at 50% -10%, #24324a 0%, transparent 60%),
      var(--ink);
    transition:opacity .6s ease, filter .6s ease;
  }

  .card{
    position:relative;
    width:min(440px, 88vw);
    background:var(--card);
    border-radius:var(--radius);
    padding:52px 40px 44px;
    text-align:center;
    box-shadow:0 30px 60px -20px rgba(0,0,0,0.45);
    border:1px solid rgba(255,255,255,0.06);
  }

  .eyebrow{
    display:inline-block;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--accent-deep);
    margin-bottom:22px;
  }
  .eyebrow::before,
  .eyebrow::after{
    content:"";
    display:inline-block;
    width:18px; height:1px;
    background:var(--accent);
    vertical-align:middle;
    margin:0 8px 3px;
  }

  .card h1{
    font-family:'Fraunces', serif;
    font-weight:500;
    font-size:26px;
    line-height:1.4;
    color:var(--text);
    margin-bottom:16px;
    letter-spacing:-0.01em;
  }

  .quote{
    font-style:italic;
    font-family:'Fraunces', serif;
    font-size:14px;
    color:var(--muted);
    margin-bottom:34px;
  }

  #username{
    width:100%;
    padding:13px 16px;
    border-radius:8px;
    border:1px solid var(--line);
    background:#fff;
    font-family:'Inter', sans-serif;
    font-size:15px;
    color:var(--text);
    margin-bottom:14px;
    outline:none;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  #username:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(193,154,85,0.18);
  }
  #username::placeholder{ color:#9aa3ad; }

  #username.shake{
    animation:shake .4s ease;
    border-color:#b5564f;
  }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-6px); }
    40%{ transform:translateX(6px); }
    60%{ transform:translateX(-4px); }
    80%{ transform:translateX(4px); }
  }

  button{
    width:100%;
    padding:13px 16px;
    border:none;
    border-radius:8px;
    background:var(--ink);
    color:#f1ede2;
    font-family:'Inter', sans-serif;
    font-size:14.5px;
    font-weight:600;
    letter-spacing:0.01em;
    cursor:pointer;
    transition:background .2s ease, transform .15s ease;
  }
  button:hover{ background:var(--surface-soft); }
  button:active{ transform:scale(0.98); }
  button:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }

  /* ---------- TRANSITION (signature element) ---------- */
  #transition{
    position:absolute;
    inset:0;
    pointer-events:none;
    opacity:0;
    z-index:50;
    background:linear-gradient(to bottom, var(--sky-dusk-top), var(--sky-dusk-bottom));
    overflow:hidden;
    perspective:600px;
    perspective-origin:50% 38%;
  }

  #transition.active{
    pointer-events:auto;
    animation:skyShift 2.4s ease forwards;
  }

  @keyframes skyShift{
    0%{
      opacity:0;
      background:linear-gradient(to bottom, var(--sky-dusk-top), var(--sky-dusk-bottom));
    }
    12%{ opacity:1; }
    100%{
      opacity:1;
      background:linear-gradient(to bottom, var(--sky-dawn-top), var(--sky-dawn-mid) 55%, var(--sky-dawn-bottom));
    }
  }

  .stars{
    position:absolute;
    inset:0;
    opacity:0.9;
    transition:opacity 1.4s ease 0.4s;
  }
  #transition.active .stars{ opacity:0; }
  .star{
    position:absolute;
    width:2px; height:2px;
    background:#fff;
    border-radius:50%;
  }

  .horizon-glow{
    position:absolute;
    left:50%; bottom:0;
    width:140%;
    height:42%;
    transform:translateX(-50%);
    background:radial-gradient(ellipse at 50% 100%, rgba(244,201,138,0) 0%, rgba(244,201,138,0) 100%);
    opacity:0;
    transition:opacity .8s ease;
  }
  #transition.active .horizon-glow{
    opacity:1;
    background:radial-gradient(ellipse at 50% 100%, rgba(244,201,138,0.55) 0%, rgba(244,201,138,0) 70%);
  }

  .road-wrap{
    position:absolute;
    left:0; right:0; bottom:0;
    height:60%;
    transform-style:preserve-3d;
  }

  .road{
    position:absolute;
    left:50%; bottom:-20%;
    width:1800px;
    height:1100px;
    margin-left:-900px;
    background:
      linear-gradient(to top, #1c2a3d 0%, #243650 55%, rgba(36,54,80,0) 100%);
    clip-path:polygon(46% 0%, 54% 0%, 78% 100%, 22% 100%);
    transform:rotateX(72deg) translateZ(0) scale(1);
    transform-origin:50% 100%;
    transition:transform 2.2s cubic-bezier(.4,0,.2,1);
  }
  #transition.active .road{
    transform:rotateX(72deg) translateZ(0) scale(2.6) translateY(-8%);
  }

  .markers{
    position:absolute;
    inset:0;
    transform-style:preserve-3d;
  }
  .marker{
    position:absolute;
    left:50%; bottom:0;
    width:8px; height:42px;
    margin-left:-4px;
    background:var(--accent);
    border-radius:2px;
    opacity:0;
    transform-origin:50% 100%;
  }
  #transition.active .marker{
    animation:markerFly 1.6s cubic-bezier(.4,0,.2,1) forwards;
  }
  @keyframes markerFly{
    0%{ opacity:0; transform: translateY(0) scaleY(0.3) scaleX(0.3); }
    15%{ opacity:0.9; }
    100%{ opacity:0; transform: translateY(-620px) scaleY(2.6) scaleX(2.6); }
  }

  .car-rig{
    position:absolute;
    left:50%; bottom:14%;
    width:64px; height:26px;
    margin-left:-32px;
    opacity:0;
    transform-origin:50% 100%;
  }
  #transition.active .car-rig{
    animation:carDrive 2.2s cubic-bezier(.3,0,.2,1) forwards;
  }
  @keyframes carDrive{
    0%{ opacity:0; bottom:12%; transform:scale(0.55) translateX(0); }
    10%{ opacity:1; transform:scale(0.6) translateX(-6px); }
    30%{ transform:scale(0.85) translateX(8px); }
    50%{ transform:scale(1.15) translateX(-5px); }
    78%{ opacity:1; }
    100%{ opacity:0; bottom:90%; transform:scale(2.1) translateX(0); }
  }

  .car-svg{ width:100%; height:100%; display:block; filter:drop-shadow(0 4px 10px rgba(0,0,0,0.4)); }

  .trail{
    position:absolute;
    left:50%; bottom:14%;
    width:6px; height:60px;
    margin-left:-26px;
    border-radius:50%;
    background:linear-gradient(to top, rgba(255,255,255,0.75), rgba(255,255,255,0));
    opacity:0;
    filter:blur(1px);
  }
  .trail.right{ margin-left:20px; }
  #transition.active .trail{
    animation:trailStretch 2.2s cubic-bezier(.3,0,.2,1) forwards;
  }
  @keyframes trailStretch{
    0%{ opacity:0; bottom:14%; height:10px; }
    12%{ opacity:0.8; }
    50%{ height:90px; }
    78%{ opacity:0.6; }
    100%{ opacity:0; bottom:90%; height:140px; }
  }

  .greeting{
    position:absolute;
    left:50%; top:50%;
    transform:translate(-50%,-50%);
    font-family:'Fraunces', serif;
    font-size:22px;
    color:#2a2014;
    text-align:center;
    opacity:0;
    letter-spacing:0.01em;
  }
  #transition.active .greeting{
    animation:greetingIn 1.2s ease forwards;
    animation-delay:1.1s;
  }
  @keyframes greetingIn{
    0%{ opacity:0; transform:translate(-50%,-46%); }
    100%{ opacity:1; transform:translate(-50%,-50%); }
  }

  /* ---------- CHAT ---------- */
  #chat{
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
    background:var(--surface);
    opacity:0;
    transition:opacity .7s ease;
  }
  #chat.visible{ display:flex; opacity:1; }

  .chat-header{
    padding:16px 24px;
    background:var(--ink);
    color:#f1ede2;
    border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .chat-header .room-line{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .chat-header .room{
    font-family:'Fraunces', serif;
    font-size:18px;
    font-weight:500;
  }
  .chat-header .notice{
    margin-top:4px;
    font-size:12px;
    color:var(--accent);
    letter-spacing:0.02em;
  }
  #showName{
    font-family:'Inter', sans-serif;
    font-size:12px;
    color:#9aa6b5;
    font-weight:500;
  }
  .leave-btn{
    width:auto;
    padding:8px 16px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.25);
    color:#f1ede2;
    font-size:13px;
    font-weight:500;
  }
  .leave-btn:hover{ background:rgba(255,255,255,0.08); }

  .status{
    font-size:11px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    padding:6px 24px;
    color:#9aa6b5;
    background:var(--surface-soft);
    border-bottom:1px solid rgba(255,255,255,0.05);
  }
  .status.online{ color:#7fb89a; }
  .status.offline{ color:#c97b6e; }

  .messages{
    flex:1;
    padding:24px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  .msg{
    max-width:66%;
    padding:11px 15px;
    border-radius:12px;
    font-size:14.5px;
    line-height:1.5;
    color:#1c2733;
    background:#eee9da;
    align-self:flex-start;
    border-bottom-left-radius:3px;
  }
  .msg.me{
    align-self:flex-end;
    background:var(--accent);
    color:#1f1709;
    border-bottom-right-radius:3px;
  }
  .msg b{
    display:block;
    font-size:11px;
    font-weight:600;
    color:var(--teal);
    margin-bottom:3px;
    letter-spacing:0.02em;
  }
  .msg.me b{ color:#5a4517; }

  .send{
    padding:16px 24px;
    display:flex;
    gap:10px;
    background:var(--surface-soft);
    border-top:1px solid rgba(255,255,255,0.06);
  }
  .send input{
    flex:1;
    padding:11px 14px;
    border-radius:8px;
    border:none;
    background:#0e1826;
    color:#f1ede2;
    font-family:'Inter', sans-serif;
    font-size:14px;
    outline:none;
  }
  .send input::placeholder{ color:#5d6b7c; }
  .send button{ width:auto; padding:11px 22px; }

  /* ---------- ambient running horse (above the Group Chat label) ---------- */
  .horse-mini{
    width:60px;
    height:44px;
    margin:0 auto 8px;
    animation: gallopBounce 0.42s ease-in-out infinite;
  }
  .horse-svg{ width:100%; height:100%; filter:drop-shadow(0 4px 5px rgba(0,0,0,0.3)); }
  @keyframes gallopBounce{
    0%,100%{ transform:translateY(0) scaleX(1); }
    45%{ transform:translateY(-4px) scaleX(0.97); }
    50%{ transform:translateY(-5px) scaleX(0.97); }
    90%{ transform:translateY(0) scaleX(1.03); }
  }
  .horse-svg .leg-front, .horse-svg .leg-back{
    transform-origin:50% 0%;
    animation: legSwing 0.42s linear infinite;
  }
  .horse-svg .leg-back{ animation-delay:0.21s; }
  @keyframes legSwing{
    0%, 100%{ transform:rotate(18deg); }
    50%{ transform:rotate(-18deg); }
  }

</style>
</head>
<body>

<div class="app">

  <!-- HOME -->
  <div id="home">
    <div class="card">
      <div class="horse-mini">
        <svg class="horse-svg" viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
          <!-- tail (dark, two-tone) -->
          <path d="M58 27 C44 23 27 27 17 37 C9 45 7 55 11 64 C15 56 15 47 23 39 C29 33 39 29 49 30 C53 30 57 29 58 27 Z" fill="#2e1c10"/>
          <path d="M50 32 C42 33 35 37 30 43 C25 49 23 56 24 62 C27 56 28 50 33 45 C38 40 45 36 51 35 Z" fill="#4a2e1c"/>

          <!-- back legs (animated) -->
          <g class="leg-back">
            <path d="M91 50 L97 64" stroke="#c8792e" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M97 64 L101 79" stroke="#fdfbf6" stroke-width="5" fill="none" stroke-linecap="round"/>
            <ellipse cx="102" cy="81" rx="4.2" ry="2.6" fill="#e8a87c"/>
          </g>
          <g class="leg-back">
            <path d="M87 52 C83 58 80 61 81 67" stroke="#c8792e" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M81 67 C80.5 69 81 71 82 73" stroke="#fdfbf6" stroke-width="5" fill="none" stroke-linecap="round"/>
            <ellipse cx="82.5" cy="74.5" rx="4" ry="2.4" fill="#e8a87c"/>
          </g>

          <!-- body -->
          <path d="M58 41 C56 33 60 26 68 25 C80 23 92 27 98 35 C102 41 100 49 94 52 L92 49 C90 52 85 53 80 52 C70 55 60 54 55 49 C53 46 55 43 58 41 Z" fill="#c8792e"/>

          <!-- front legs (animated) -->
          <g class="leg-front">
            <path d="M68 49 L64 61" stroke="#c8792e" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M64 61 L59 79" stroke="#fdfbf6" stroke-width="5" fill="none" stroke-linecap="round"/>
            <ellipse cx="58" cy="81" rx="4.2" ry="2.6" fill="#e8a87c"/>
          </g>
          <g class="leg-front">
            <path d="M74 49 C72 56 76 60 74 66" stroke="#c8792e" stroke-width="5" fill="none" stroke-linecap="round"/>
            <path d="M74 66 C73.5 68 74 70 75 72" stroke="#fdfbf6" stroke-width="5" fill="none" stroke-linecap="round"/>
            <ellipse cx="75.5" cy="73.5" rx="4" ry="2.4" fill="#e8a87c"/>
          </g>

          <!-- neck + head -->
          <path d="M68 25 C66 17 70 9 78 6 C84 4 90 5 93 9 C96 7 99 9 99 12 C102 11 104 14 102 17 C104 18 104 21 101 22 C99 25 95 26 92 24 L88 27 L85 24 C78 26 71 24 68 25 Z" fill="#c8792e"/>

          <!-- white blaze -->
          <path d="M89 7 C91 11 93 16 92 21 C90 19 88 16 88 12 C88 10 88 8 89 7 Z" fill="#fdfbf6"/>
          <path d="M92 21 C94 22 97 22 99 20 C97 23 93 24 91 23 Z" fill="#fdfbf6"/>

          <!-- ears -->
          <path d="M83 6 L81 0.5 L87 4 Z" fill="#c8792e"/>
          <path d="M88 5 L87 0.2 L92 3 Z" fill="#c8792e"/>

          <!-- mane -->
          <path d="M68 22 L72 18 L69 15 L74 12 L71 9 L76 7 L74 4" stroke="#2e1c10" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

          <!-- eye -->
          <circle cx="95" cy="13" r="1.1" fill="#1c140d"/>
        </svg>
      </div>
      <span class="eyebrow">Group Chat</span>
      <h1>True success is the quiet satisfaction of knowing you did your best.</h1>
      <div class="quote">Failure is the pillar of success</div>
      <input id="username" placeholder="Enter your name">
      <button onclick="enterChat()">Go to Group Chat</button>
    </div>
  </div>

  <!-- TRANSITION -->
  <div id="transition">
    <div class="stars" id="stars"></div>
    <div class="horizon-glow"></div>
    <div class="road-wrap">
      <div class="road"></div>
      <div class="markers" id="markers"></div>
    </div>
    <div class="trail"></div>
    <div class="trail right"></div>
    <div class="car-rig">
      <svg class="car-svg" viewBox="0 0 64 26" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="32" cy="24" rx="22" ry="1.8" fill="rgba(0,0,0,0.25)"/>
        <circle cx="14" cy="19.5" r="5" fill="#0e1826" stroke="#c19a55" stroke-width="0.9"/>
        <circle cx="48" cy="19.5" r="5" fill="#0e1826" stroke="#c19a55" stroke-width="0.9"/>
        <circle cx="14" cy="19.5" r="1.6" fill="#c19a55"/>
        <circle cx="48" cy="19.5" r="1.6" fill="#c19a55"/>
        <path d="M14 19.5 L26 12 L34 12 L40 19.5" fill="none" stroke="#1c2a3d" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M26 12 L30 19.5 L40 19.5" fill="none" stroke="#1c2a3d" stroke-width="2" stroke-linecap="round"/>
        <path d="M40 19.5 L48 19.5" fill="none" stroke="#1c2a3d" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M22 12 L30 9" stroke="#1c2a3d" stroke-width="2" stroke-linecap="round"/>
        <circle cx="31" cy="6" r="3.4" fill="#1c2a3d"/>
        <path d="M29 8.5 C27 10 26.5 13 27.5 16" fill="none" stroke="#1c2a3d" stroke-width="2.6" stroke-linecap="round"/>
        <path d="M33 8.5 C35 11 35.5 14 34.5 18" fill="none" stroke="#1c2a3d" stroke-width="2.6" stroke-linecap="round"/>
        <rect x="58" y="11" width="2.2" height="2.2" rx="0.6" fill="#ffd9a0"/>
      </svg>
    </div>
    <div class="greeting" id="greeting"></div>
  </div>

  <!-- CHAT -->
  <div id="chat">
    <div class="chat-header">
      <div class="room-line">
        <div>
          <div class="room">General Room</div>
          <div class="notice">Please discuss only essential matters</div>
        </div>
        <div>
          <span id="showName"></span>
          <button class="leave-btn" onclick="leaveChat()" style="margin-left:12px;">Leave</button>
        </div>
      </div>
    </div>

    <div class="status" id="status">Connecting…</div>

    <div class="messages" id="messages"></div>

    <div class="send">
      <input id="message" placeholder="Write message"
        onkeydown="if(event.key==='Enter')send();">
      <button onclick="send()">Send</button>
    </div>
  </div>

</div>

<script>
  /* ---------- decorative: stars + road markers ---------- */
  const starsEl = document.getElementById('stars');
  for(let i=0;i<70;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*70 + '%';
    s.style.opacity = (0.3 + Math.random()*0.7).toFixed(2);
    starsEl.appendChild(s);
  }

  const markersEl = document.getElementById('markers');
  for(let i=0;i<10;i++){
    const m = document.createElement('div');
    m.className = 'marker';
    m.style.animationDelay = (i*0.13) + 's';
    markersEl.appendChild(m);
  }

  /* ---------- BACKEND CONNECTION ---------- */
  const socket = io("https://discuss-backend-22gf.onrender.com");
  let user = "";

  const statusEl = document.getElementById('status');

  socket.on('connect', () => {
    statusEl.textContent = 'Connected — live';
    statusEl.className = 'status online';
  });
  socket.on('disconnect', () => {
    statusEl.textContent = 'Disconnected — trying to reconnect…';
    statusEl.className = 'status offline';
  });
  socket.on('connect_error', () => {
    statusEl.textContent = 'Could not reach server';
    statusEl.className = 'status offline';
  });

  /* ---------- ambient horse gallop (landing page only) ---------- */
  let horseCtx = null;
  let horseTimer = null;

  function hoofbeat(ctx, time){
    const len = ctx.sampleRate * 0.07;
    const buffer = ctx.createBuffer(1, len, ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for(let i=0;i<len;i++){ data[i] = (Math.random()*2-1) * (1 - i/len); }
    const noise = ctx.createBufferSource();
    noise.buffer = buffer;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 110 + Math.random()*35;
    filter.Q.value = 1.1;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.45, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time + 0.13);
    noise.connect(filter); filter.connect(gain); gain.connect(ctx.destination);
    noise.start(time); noise.stop(time + 0.13);
  }

  function startHorseAmbience(){
    if(horseTimer) return;
    try{
      horseCtx = new (window.AudioContext || window.webkitAudioContext)();
      const scheduleCycle = () => {
        const t = horseCtx.currentTime + 0.05;
        [0, 0.13, 0.27, 0.37].forEach(offset => hoofbeat(horseCtx, t + offset));
      };
      scheduleCycle();
      horseTimer = setInterval(scheduleCycle, 880);
    }catch(e){ /* audio not available */ }
  }

  function stopHorseAmbience(){
    if(horseTimer){ clearInterval(horseTimer); horseTimer = null; }
    if(horseCtx){ try{ horseCtx.close(); }catch(e){} horseCtx = null; }
  }

  document.addEventListener('click', startHorseAmbience, { once:true });
  document.addEventListener('keydown', startHorseAmbience, { once:true });

  /* ---------- bike sound for the road transition (synthesized) ---------- */
  function playBikeSound(){
    try{
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const now = ctx.currentTime;
      const dur = 2.0;

      const osc = ctx.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(190, now);
      osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
      osc.frequency.exponentialRampToValueAtTime(680, now + dur * 0.8);
      osc.frequency.exponentialRampToValueAtTime(400, now + dur);

      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(0.2, now + 0.08);
      gain.gain.exponentialRampToValueAtTime(0.13, now + dur * 0.8);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + dur);

      const filter = ctx.createBiquadFilter();
      filter.type = 'bandpass';
      filter.frequency.setValueAtTime(900, now);
      filter.frequency.linearRampToValueAtTime(2200, now + dur * 0.8);
      filter.Q.value = 0.7;

      osc.connect(gain); gain.connect(filter); filter.connect(ctx.destination);
      osc.start(now); osc.stop(now + dur);
    }catch(e){ /* audio not available, fail silently */ }
  }

  /* ---------- ENTER CHAT (with road-to-sky transition) ---------- */
  function enterChat(){
    const input = document.getElementById('username');
    const name = input.value.trim();
    if(!name){
      input.classList.remove('shake');
      void input.offsetWidth;
      input.classList.add('shake');
      input.focus();
      return;
    }

    user = name;
    localStorage.setItem('chatUsername', name);
    stopHorseAmbience();
    playBikeSound();
    document.getElementById('greeting').textContent = 'Welcome, ' + name;
    document.getElementById('showName').textContent = name;

    const home = document.getElementById('home');
    const trans = document.getElementById('transition');
    const chat = document.getElementById('chat');

    home.style.opacity = '0';
    home.style.filter = 'blur(6px)';
    trans.classList.add('active');

    setTimeout(()=>{
      chat.classList.add('visible');
      document.getElementById('message').focus();
    }, 2300);

    setTimeout(()=>{
      trans.classList.remove('active');
      home.style.display = 'none';
    }, 2900);
  }

  /* ---------- INSTANT ENTRY (returning user, no landing page / no transition) ---------- */
  function instantEnterChat(name){
    user = name;
    document.getElementById('showName').textContent = name;

    const home = document.getElementById('home');
    const chat = document.getElementById('chat');

    home.style.display = 'none';
    chat.classList.add('visible');
  }

  function leaveChat(){
    localStorage.removeItem('chatUsername');
    location.reload();
  }

  /* ---------- SEND MESSAGE ---------- */
  function send(){
    const input = document.getElementById('message');
    const text = input.value.trim();
    if(!text || !user) return;

    socket.emit('send_message', { user, text });
    input.value = '';
  }

  /* ---------- RENDER MESSAGE ---------- */
  function addMessage(data){
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg' + (data.user === user ? ' me' : '');
    div.innerHTML = `<b>${escapeHtml(data.user)}</b>${escapeHtml(data.text)}`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  /* ---------- REAL-TIME EVENTS ---------- */
  socket.on('receive_message', data => addMessage(data));

  socket.on('chat_history', messages => {
    const box = document.getElementById('messages');
    box.innerHTML = '';
    messages.forEach(msg => addMessage(msg));
  });

  document.getElementById('username').addEventListener('keydown', e=>{
    if(e.key === 'Enter') enterChat();
  });

  /* ---------- ON LOAD: skip landing page if a name is already saved ---------- */
  (function(){
    const savedName = localStorage.getItem('chatUsername');
    if(savedName){
      instantEnterChat(savedName);
    }
  })();
</script>

</body>
