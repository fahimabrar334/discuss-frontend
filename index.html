<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Group Chat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{height:100vh;background:#eef2ff}
#home{height:100%;display:flex;justify-content:center;align-items:center}
.card{background:#fff;padding:40px;width:350px;border-radius:20px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,.1)}
h1{margin-bottom:20px;font-size:22px}.quote{color:#555;margin-bottom:25px}
input{width:100%;padding:12px;margin-bottom:15px;border:1px solid #ccc;border-radius:10px}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#4f46e5;color:#fff;cursor:pointer}
#chat{display:none;height:100%}.header{background:#4f46e5;color:#fff;padding:20px}
.messages{height:75vh;overflow:auto;padding:20px}.msg{background:#fff;padding:12px;border-radius:10px;margin-bottom:10px}
.send{display:flex;padding:10px;gap:10px;background:#fff}.send input{margin:0}
</style>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
</head>

<body>

<div id="home">
  <div class="card">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" style="width:80px;height:80px;margin-bottom:15px;">
    <h1>True success is the quiet satisfaction of knowing you did your best.</h1>
    <div class="quote">Failure is the pillar of success</div>
    <input id="username" placeholder="Enter your name">
    <button onclick="enterChat()">Go to Group Chat</button>
  </div>
</div>

<div id="chat">
  <div class="header">
    Please discuss only essential matters 
    <span id="showName"></span>
  </div>

  <div class="messages" id="messages"></div>

  <div class="send">
    <input id="message" placeholder="Write message"
      onkeydown="if(event.key==='Enter')send();">
    <button onclick="send()">Send</button>
  </div>
</div>

<script>
const socket = io("https://discuss-backend-22gf.onrender.com");

let user = "";

/* ENTER CHAT */
function enterChat(){
  user = document.getElementById("username").value.trim();
  if(!user){
    alert("Enter name");
    return;
  }

  document.getElementById("home").style.display = "none";
  document.getElementById("chat").style.display = "block";
  document.getElementById("showName").innerText = user;
}

/* SEND MESSAGE */
function send(){
  const input = document.getElementById("message");
  const text = input.value.trim();
  if(!text) return;

  socket.emit("send_message", { user, text });
  input.value = "";
}

/* NEW MESSAGE (REAL TIME) */
socket.on("receive_message", data => {
  addMessage(data);
});

/* CHAT HISTORY (IMPORTANT FIX) */
socket.on("chat_history", messages => {
  const box = document.getElementById("messages");
  box.innerHTML = "";

  messages.forEach(msg => {
    addMessage(msg);
  });
});

/* COMMON FUNCTION */
function addMessage(data){
  const box = document.getElementById("messages");

  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<b>${data.user}</b><br>${data.text}`;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}
</script>

</body>
</html>
